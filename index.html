<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signature Generator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h2>Create Your Signature</h2>

  <form id="signatureForm">
    <label>Full Name: 
      <input type="text" id="fullName" value="Theart Jooste" required>
    </label><br>
    <label>Position: 
      <input type="text" id="position" value="Software Engineer" required>
    </label><br>
    <label>Cellphone: 
      <input type="text" id="cellphone" value="083 123 4567" required>
    </label><br>
    <label>Email: 
      <input type="email" id="email" value="theartjooste@waterfordcarriers.co.za" required>
    </label><br>
    <button id="submitbtn" type="submit">Update Signature</button>
  </form>

  <!-- Signature preview -->
  <div class="signature-container" id="signaturePreview">
    <div class="signature-text-block">
      <div class="signature-text signature-name" id="sigName"></div>
      <div class="signature-text signature-position" id="sigPosition"></div>
      <div class="signature-text signature-cell" id="sigCell"></div>
      <div class="signature-text signature-email" id="sigEmail"></div>
      <div class="signature-text signature-website" id="sigWebsite"></div>
    </div>
    <div class="Signature-watermark">
  <img src="https://ZAmystic.github.io/EmailSignatureApplication/assets/TempTest.png" 
       alt="Signature Template" 
       class="signature-template"
       crossorigin="anonymous">
</div>

  </div>

  <div class="actions">
    <button id="downloadBtn" type="button">Download PNG</button>
    <!-- <button id="copyUrlBtn" type="button">Copy Signature URL</button> -->
  </div>

  <!-- <div id="signatureUrlContainer">
    <label for="signatureUrl">Signature URL:</label>
    <input type="text" id="signatureUrl" readonly>
  </div> -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
